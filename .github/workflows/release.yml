name: Release Drafter

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.6.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Test with Gradle
        run: ./gradlew test
        continue-on-error: true

      - name: Publish test results
        id: publish-test-results
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: success() || failure()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'

      - uses: release-drafter/release-drafter@v7
        id: release-drafter
        if: always()
        with:
          publish: false
          footer: |


            ## Check summary
            
            <table>
              <tr>
              <th>
                <th>Tests 💯</th>
                <th>Passed ✅</th>
                <th>Skipped ⏭️</th>
                <th>Failed ❌</th>
              </tr>
              <tr>
                <td>JUnit Test Report</td>
                <td>${{ steps.publish-test-results.outputs.total }} ran</td>
                <td>${{ steps.publish-test-results.outputs.passed }} passed</td>
                <td>${{ steps.publish-test-results.outputs.skipped }} skipped</td>
                <td>${{ steps.publish-test-results.outputs.failed }} failed</td>
              </tr>
            </table>
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}