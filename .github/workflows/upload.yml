name: upload_release

on:
  release:
    types: [ published ]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Set plugin version
        run: sed -i "s/versionPlaceholder/${{ github.event.release.tag_name }}/g" ./build.gradle.kts

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Rename jar
        run: mv ./paper/build/libs/paper-*-all.jar ./mpm_${{ github.event.release.tag_name }}.jar

      # GitHub Attestations で署名（SLSA build provenance）
      - name: Attest JAR artifacts
        id: attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ./mpm_${{ github.event.release.tag_name }}.jar

      - uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: txv68jS0
          modrinth-featured: true
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-draft: false
          files: |
            ./mpm_${{ github.event.release.tag_name }}.jar
          loaders: |
            paper
            purpur
          game-versions: |
            1.21
          game-version-filter: releases
          java: |
            21

      # リリースノートにAttestationの検証リンクを追記する（利用者がリリースページから直接検証できるように）
      - name: Append attestation link to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}
        run: |
          current_notes=$(gh release view "${{ github.event.release.tag_name }}" --json body -q .body)
          if [[ "$current_notes" != *"$ATTESTATION_URL"* ]]; then
            printf '%s\n\n---\n📜 **Attestation** (SLSA provenance): [Verify on GitHub](%s) or run `gh attestation verify <jar-file> --owner morinoparty`\n' \
              "$current_notes" "$ATTESTATION_URL" > notes.md
            gh release edit "${{ github.event.release.tag_name }}" --notes-file notes.md
          fi