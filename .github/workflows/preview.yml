name: preview.yml
on:
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

env:
  PREVIEW_BASE_URL: https://moripa-ci.nikomaru.dev/mpm
  PROJECT_NAME: mpm

jobs:
  # Gradle ビルド (JAR + テスト + detekt)
  build-jar:
    runs-on: ubuntu-latest
    # actions/attest-build-provenance専用の権限をこのjobに限定する（最小権限の原則）
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      commit_sha: ${{ steps.vars.outputs.sha }}
      test_total: ${{ steps.publish-test-results.outputs.total }}
      test_passed: ${{ steps.publish-test-results.outputs.passed }}
      test_skipped: ${{ steps.publish-test-results.outputs.skipped }}
      test_failed: ${{ steps.publish-test-results.outputs.failed }}
      attestation_url: ${{ steps.attest.outputs.attestation-url }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short HEAD)
          echo "sha=$calculatedSha" >> $GITHUB_OUTPUT

      - name: Change plugin.yml version
        run: |
          before="$GITHUB_ENV"
          after="${before//v/}"
          sed -i 's/VersionPlaceholder/$after/' ./gradle.properties

      - name: Build with Gradle
        id: build
        continue-on-error: true
        run: ./gradlew build

      - name: Install Allure CLI
        if: success() || failure()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.2/allure-2.32.2.tgz | tar -xz
          echo "$PWD/allure-2.32.2/bin" >> $GITHUB_PATH

      - name: Aggregate Allure results
        if: success() || failure()
        run: |
          mkdir -p ./build/allure-results-aggregated
          # 各モジュールの allure-results を1箇所へ集約する。
          # 新しいモジュールにテストを追加してもここを編集せずレポートへ自動的に含まれる。
          find . -type d -path '*/build/allure-results' -not -path '*/allure-results-aggregated/*' | while read -r dir; do
            cp -a "$dir/." ./build/allure-results-aggregated/ 2>/dev/null || true
          done

      - name: Generate Allure report
        if: success() || failure()
        continue-on-error: true
        run: allure generate ./build/allure-results-aggregated -o ./build/allure-report --clean

      - name: Publish test results
        id: publish-test-results
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: success() || failure()
        with:
          report_paths: './**/build/test-results/test/TEST-*.xml'

      # GitHub Attestations で署名（SLSA build provenance）
      # Build with GradleがJAR生成前に失敗した場合はsubject-pathが空になりこのstep自体が失敗するため、
      # continue-on-errorで握りつぶされた実際のビルド結果(steps.build.outcome)で明示的にガードする
      - name: Attest JAR artifacts
        id: attest
        if: steps.build.outcome == 'success'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            paper/build/libs/paper-*-all.jar
            api/build/libs/api-*.jar

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jar-artifacts
          retention-days: 1
          path: |
            paper/build/libs/paper-*-all.jar
            api/build/libs/api-*.jar
            paper/build/reports/tests/test/
            build/reports/detekt/
            build/allure-report/

  # Dokka ドキュメント生成
  build-dokka:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Generate Dokka API documentation
        run: ./gradlew dokkaGenerate

      - name: Upload Dokka artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dokka-artifacts
          retention-days: 1
          path: docs/public/dokka/

  # Docs ビルド
  build-docs:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.0.0
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short HEAD)
          echo "sha=$calculatedSha" >> $GITHUB_OUTPUT

      - name: Install docs dependencies
        working-directory: docs
        run: pnpm i --frozen-lockfile

      # サイドバーの Kotlin アイコンから Dokka に遷移できるよう、docs ビルド前に
      # docs/public/dokka へ Dokka を生成しておく（pnpm build が public/ を同梱する）
      - name: Generate Dokka into docs/public/dokka
        run: ./gradlew dokkaGenerate

      - name: Build docs
        working-directory: docs
        env:
          BASE_PATH: /mpm/${{ steps.vars.outputs.sha }}/docs
          NEXT_PUBLIC_BASE_PATH: /mpm/${{ steps.vars.outputs.sha }}/docs
        run: pnpm run build

      - name: Upload docs artifacts
        uses: actions/upload-artifact@v7
        with:
          name: docs-artifacts
          retention-days: 1
          path: docs/out/

  # S3 アップロード & PRコメント
  upload:
    needs: [build-jar, build-dokka, build-docs]
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: true
      AWS_REGION: auto
      AWS_CLI_FILE_ENCODING: UTF-8
      AWS_DEFAULT_S3_SIGNATURE_VERSION: s3v4
      S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      COMMIT_SHORT_SHA: ${{ needs.build-jar.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare upload directory
        run: |
          mkdir -p ./upload/jars
          mkdir -p ./upload/junit
          mkdir -p ./upload/detekt
          mkdir -p ./upload/docs
          mkdir -p ./upload/dokka
          mkdir -p ./upload/allure

          # JAR artifacts
          mv artifacts/jar-artifacts/paper/build/libs/paper-*-all.jar ./upload/jars/${{ env.PROJECT_NAME }}-paper-${{ env.COMMIT_SHORT_SHA }}.jar || true
          mv artifacts/jar-artifacts/api/build/libs/api-*.jar ./upload/jars/${{ env.PROJECT_NAME }}-api-${{ env.COMMIT_SHORT_SHA }}.jar || true
          cp -r artifacts/jar-artifacts/paper/build/reports/tests/test/* ./upload/junit/ || true
          cp -r artifacts/jar-artifacts/build/reports/detekt/* ./upload/detekt/ || true
          cp -r artifacts/jar-artifacts/build/allure-report/* ./upload/allure/ || true

          # Dokka artifacts
          cp -r artifacts/dokka-artifacts/* ./upload/dokka/ || true

          # Docs artifacts
          cp -r artifacts/docs-artifacts/* ./upload/docs/

      - name: Upload to S3
        run: |
          # AWS CLIの並列リクエスト数を増やす
          aws configure set default.s3.max_concurrent_requests 50

          S3_BASE="s3://${{ env.S3_UPLOAD_BUCKET }}/mpm/${{ env.COMMIT_SHORT_SHA }}"
          S3_OPTS="--endpoint-url ${S3_ENDPOINT} --only-show-errors"

          # 各ディレクトリを並列でアップロード
          aws s3 cp ./upload/jars $S3_BASE/jars $S3_OPTS --recursive &
          aws s3 cp ./upload/junit $S3_BASE/junit $S3_OPTS --recursive &
          aws s3 cp ./upload/detekt $S3_BASE/detekt $S3_OPTS --recursive &
          aws s3 cp ./upload/dokka $S3_BASE/dokka $S3_OPTS --recursive &
          aws s3 cp ./upload/docs $S3_BASE/docs $S3_OPTS --recursive &
          aws s3 cp ./upload/allure $S3_BASE/allure $S3_OPTS --recursive &

          # 全ての並列アップロードを待機
          wait
          echo "S3 upload completed"

      - name: Get limit time
        id: limit-time
        run: |
          limit_time=$(date -d "7 days" +%Y-%m-%d)
          echo "LIMIT_TIME=$limit_time" >> $GITHUB_ENV

      - name: Create comment file
        env:
          ARTIFACT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/jars/${{ env.PROJECT_NAME }}-paper-${{ env.COMMIT_SHORT_SHA }}.jar"
          ARTIFACT_URL_API: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/jars/${{ env.PROJECT_NAME }}-api-${{ env.COMMIT_SHORT_SHA }}.jar"
          JUNIT_REPORT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/junit/index.html"
          ALLURE_REPORT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/allure/index.html"
          DETEKT_REPORT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/detekt/detekt.html"
          DOCS_PREVIEW_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/docs/index.html"
          DOKKA_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/dokka/index.html"
          ATTESTATION_URL: "${{ needs.build-jar.outputs.attestation_url }}"
          TEST_TOTAL: "${{ needs.build-jar.outputs.test_total }}"
          TEST_PASSED: "${{ needs.build-jar.outputs.test_passed }}"
          TEST_SKIPPED: "${{ needs.build-jar.outputs.test_skipped }}"
          TEST_FAILED: "${{ needs.build-jar.outputs.test_failed }}"
          LIMIT_TIME: ${{ env.LIMIT_TIME }}
        run: |
          cat  << EOF > comment.md
          ## 🚀 Preview of ${{ github.event.repository.name }}

          ### 📦 Preview JARs
          | Artifact | Download |
          |----------|----------|
          | Bukkit (Paper) | [$ARTIFACT_URL]($ARTIFACT_URL) |
          | API | [$ARTIFACT_URL_API]($ARTIFACT_URL_API) |

          > 📜 **Attestation** (SLSA provenance): [Verify on GitHub]($ATTESTATION_URL) or run \`gh attestation verify <jar-file> --owner morinoparty\`

          ### 📖 Documentation & Reports
          Available for 7 days (until $LIMIT_TIME)
          | Resource | Link |
          |----------|------|
          | 📖 Documentation | [Preview]($DOCS_PREVIEW_URL) |
          | 📖 Dokka API | [Preview]($DOKKA_URL) |
          | 🧪 Allure Report | [Report]($ALLURE_REPORT_URL) |
          | 🧪 JUnit Report | [Report]($JUNIT_REPORT_URL) |
          | 🔍 Detekt Report | [Report]($DETEKT_REPORT_URL) |

          ### 🧪 Test Summary
          | Tests | Passed | Skipped | Failed |
          |-------|--------|---------|--------|
          | $TEST_TOTAL | $TEST_PASSED ✅ | $TEST_SKIPPED ⏭️ | $TEST_FAILED ❌ |
          EOF

      - name: Create PR comment
        if: ${{ github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize') }}
        run: gh pr comment ${{ github.event.number }} --body-file comment.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
